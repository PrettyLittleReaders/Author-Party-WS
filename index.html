<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLR Buried Words</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  color: white;
  text-align: center;

  background: 
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1512820790803-83ca734da794");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.game-card {
  background: #fdf6e3;
  color: #2a0000;
  max-width: 95vw;
  margin: 40px auto;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.6),
    inset 0 0 40px rgba(0,0,0,0.1);
  position: relative;
}

.game-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.03),
    rgba(0,0,0,0.03) 1px,
    transparent 1px,
    transparent 24px
  );
  pointer-events: none;
  border-radius: 12px;
}

h1 { color: #ffccd5; }

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 3px;
  width: 90vw;
  max-width: 400px;
  margin: 20px auto;
  touch-action: none;
}

#wordList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  justify-content: center;
}

.grid.blurred { filter: blur(6px) brightness(0.7); }

.cell {
  background: #fffaf0;
  border: 1px solid #d6c5a3;
  color: #2a0000;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(14px, 4vw, 20px);
  font-weight: bold;
}

.cell.selected { background: #ffccd5; }
.cell.found { background: #ff4d6d; color: white; }

.word {
  padding: 5px 10px;
  background: rgba(0,0,0,0.05);
  border-radius: 6px;
  color: #2a0000;
}

.word.found {
  text-decoration: line-through;
  color: #ff4d6d;
  font-weight: bold;
}

.score { margin-top: 10px; }

button {
  padding: 10px;
  margin-top: 10px;
  background: #ff4d6d;
  border: none;
  border-radius: 8px;
  color: white;
}

.start-screen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

input {
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  text-align: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.overlay.active { display: flex; }

.share-card {
  background: #1a0000;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #ff4d6d;
}
</style>
</head>

<body>

<div class="start-screen" id="startScreen">
  <h2>Enter Your Name</h2>
  <input id="nameInput" placeholder="Your name...">
  <button id="startBtn">Start</button>
</div>

<div class="game-card">
  <h1>🌹PLR Buried Words🌹</h1>
  <p id="playerName"></p>

  <div id="grid" class="grid"></div>
  <div id="wordList"></div>
  <div class="score" id="score">0 / 10 Found</div>
  <button id="shareBtn" style="display:none;">Share Results</button>
</div>

<div class="overlay" id="overlay">
  <div class="share-card">
    <h2>✨ Completed ✨</h2>
    <p id="finalDetails"></p>
    <button onclick="closeShare()">Close</button>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let player = "";

function startGame(){
  const input = document.getElementById("nameInput").value.trim();
  if(!input) return alert("Enter your name!");

  player = input;
  document.getElementById("playerName").textContent = "Player: " + player;
  document.getElementById("startScreen").style.display = "none";
}

document.getElementById("startBtn").addEventListener("click", startGame);

// ===== FIXED 10 WORDS (NO SHUFFLE) =====
const weeklyWords = [
  "comedy","hockey","banter","romance","riders",
  "milwaukee","Olivia","Hayes","singer","steel"
];

// ===== GRID =====
const size=10;
let grid=Array.from({length:size},()=>Array(size).fill(""));
const dirs = [[0,1],[1,0],[0,-1],[-1,0]];

let seed = Date.now();

function rand(){
  seed = (seed*9301+49297)%233280;
  return seed/233280;
}

function place(word){
  word = word.toUpperCase();
  let placed = false, attempts = 0;

  while(!placed && attempts < 500){
    attempts++;
    let dir = dirs[Math.floor(rand()*dirs.length)];
    let row = Math.floor(rand()*size);
    let col = Math.floor(rand()*size);

    let fits = true;

    for(let i=0;i<word.length;i++){
      let r=row+dir[0]*i, c=col+dir[1]*i;
      if(r<0||r>=size||c<0||c>=size||(grid[r][c]&&grid[r][c]!==word[i])){
        fits=false; break;
      }
    }

    if(fits){
      for(let i=0;i<word.length;i++){
        let r=row+dir[0]*i, c=col+dir[1]*i;
        grid[r][c]=word[i];
      }
      placed=true;
    }
  }
}

weeklyWords.forEach(w=>place(w));

for(let r=0;r<size;r++){
  for(let c=0;c<size;c++){
    if(!grid[r][c]) grid[r][c]=String.fromCharCode(65+Math.floor(rand()*26));
  }
}

// ===== RENDER =====
const gridDiv=document.getElementById("grid");
grid.forEach(row=>{
  row.forEach(l=>{
    let d=document.createElement("div");
    d.className="cell";
    d.textContent=l;
    gridDiv.appendChild(d);
  });
});

const wordList = document.getElementById("wordList");
weeklyWords.forEach(w=>{
  let d=document.createElement("div");
  d.textContent=w.toUpperCase();
  d.className="word";
  wordList.appendChild(d);
});

// ===== GAME =====
let selected=[], selecting=false, found=0, direction=null;

function getCell(x,y){return document.elementFromPoint(x,y);}

function start(){
  if(!player) return;
  selecting=true;
  selected=[];
  direction=null;
}

function move(e){
  if(!selecting) return;
  let t=e.touches?e.touches[0]:e;
  let cell=getCell(t.clientX,t.clientY);
  if(!cell||!cell.classList.contains("cell")||selected.includes(cell)) return;

  if(selected.length===0){
    cell.classList.add("selected");
    selected.push(cell);
    return;
  }

  if(selected.length===1){
    const first=selected[0];
    const dx=cell.offsetLeft-first.offsetLeft;
    const dy=cell.offsetTop-first.offsetTop;
    direction=Math.abs(dx)>Math.abs(dy)?[0,dx>0?1:-1]:[dy>0?1:-1,0];
    cell.classList.add("selected");
    selected.push(cell);
    return;
  }

  const last=selected[selected.length-1];
  const rowDiff=cell.offsetTop-last.offsetTop;
  const colDiff=cell.offsetLeft-last.offsetLeft;

  let valid=false;
  if(direction[0]===0){
    valid=rowDiff===0&&Math.sign(colDiff)===direction[1];
  } else {
    valid=colDiff===0&&Math.sign(rowDiff)===direction[0];
  }

  if(valid){
    cell.classList.add("selected");
    selected.push(cell);
  }
}

function end(){
  selecting=false;

  let word=selected.map(c=>c.textContent).join("");
  let rev=word.split("").reverse().join("");

  let match=weeklyWords.find(
    w=>w.toUpperCase()===word||w.toUpperCase()===rev
  );

  if(match){
    selected.forEach(c=>{
      c.classList.remove("selected");
      c.classList.add("found");
    });

    document.querySelectorAll(".word").forEach(w=>{
      if(w.textContent.trim()===match.toUpperCase()&&!w.classList.contains("found")){
        w.classList.add("found");
        found++;
      }
    });

  } else {
    selected.forEach(c=>c.classList.remove("selected"));
  }

  selected=[];
  updateScore();
}

gridDiv.addEventListener("touchstart",start);
gridDiv.addEventListener("touchmove",move);
gridDiv.addEventListener("touchend",end);
gridDiv.addEventListener("mousedown",start);
gridDiv.addEventListener("mousemove",move);
gridDiv.addEventListener("mouseup",end);

// ===== SCORE =====
function updateScore(){
  document.getElementById("score").textContent = `${found} / 10 Found`;
  if(found===10){
    document.getElementById("shareBtn").style.display="inline-block";
  }
}

// ===== SHARE =====
document.getElementById("shareBtn").onclick=function(){
  const today=new Date().toLocaleDateString();
  document.getElementById("overlay").classList.add("active");
  document.getElementById("grid").classList.add("blurred");

  document.getElementById("finalDetails").innerHTML =
  `<strong>${player}</strong><br>Completed on: ${today}<br>10 / 10 Words Found 🌹`;
}

function closeShare(){
  document.getElementById("overlay").classList.remove("active");
  document.getElementById("grid").classList.remove("blurred");
}

});
</script>

</body>
</html>
